{{define "site-header"}}
<nav class="site-nav sticky-top" aria-label="Primary">
  <div class="container inner">
    <a class="site-brand" href="/" aria-label="Página inicial">{{.SiteName}}</a>

    {{if .Navigation}}
    <ul class="site-links" role="list">
      {{range .Navigation}}
      <li>
        <a href="{{.URL}}"{{if .Active}} class="active" aria-current="page"{{end}}>{{.Label}}</a>
      </li>
      {{end}}
    </ul>
    {{end}}
  </div>
</nav>
{{end}}
