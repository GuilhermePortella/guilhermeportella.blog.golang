<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Guilherme Portella</title>
  <desc id="desc">Capa social do blog técnico de Guilherme Portella.</desc>

  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf4"/>
      <stop offset="100%" stop-color="#f8f1e7"/>
    </linearGradient>
    <radialGradient id="warm-orb" cx="0" cy="0" r="1" gradientTransform="translate(988 492) rotate(145) scale(420 320)">
      <stop offset="0%" stop-color="#f3c9a4" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f3c9a4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cool-orb" cx="0" cy="0" r="1" gradientTransform="translate(184 118) rotate(30) scale(300 240)">
      <stop offset="0%" stop-color="#b7d5cf" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#b7d5cf" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#paper)"/>
  <rect width="1200" height="630" fill="url(#cool-orb)"/>
  <rect width="1200" height="630" fill="url(#warm-orb)"/>

  <g filter="url(#shadow)">
    <rect x="72" y="72" width="1056" height="486" rx="34" fill="#ffffff" fill-opacity="0.88" stroke="#e6d8cb"/>
  </g>

  <rect x="112" y="112" width="148" height="38" rx="19" fill="#f4e7da" stroke="#d9c7b6"/>
  <text x="186" y="137" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="2.6" fill="#78716c">BLOG TÉCNICO</text>

  <text x="112" y="258" font-family="Helvetica Neue, Arial, sans-serif" font-size="66" font-weight="700" fill="#1c1917">Guilherme Portella</text>
  <text x="112" y="322" font-family="Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="400" fill="#44403c">Backend, arquitetura, Go e APIs</text>
  <text x="112" y="364" font-family="Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="400" fill="#44403c">em notas práticas.</text>

  <line x1="112" y1="432" x2="1088" y2="432" stroke="#e6d8cb"/>
  <text x="112" y="488" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" font-weight="500" fill="#57534e">Artigos técnicos, projetos e decisões de engenharia de software.</text>
  <text x="112" y="525" font-family="Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="500" fill="#2563eb">guilhermeportella.github.io</text>
</svg>
